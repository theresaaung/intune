{% extends 'base.html' %}

{% block title %}Edit Profile{% endblock %}

{% block content %}
<div class="text-center mt-5">
    <h1>Edit Profile</h1>
    <form method="POST" enctype="multipart/form-data" class="mt-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-success me-2" type="submit">Save Changes</button>
    </form>
    <a href="{% url 'profile' %}" class="btn btn-secondary mt-3">Cancel</a>
    <a href="{% url 'delete_account' %}" class="btn btn-danger">Delete Account</a>
</div>
{% endblock %}
